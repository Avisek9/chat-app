server.port=8080
spring.application.name=chat-app

# WebSocket message size limits
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# H2 Database
spring.datasource.url=jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Message history: how many past messages to load per room/DM
app.chat.history-size=50

# Logging
logging.level.com.chat.app=DEBUG
